<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>出库指令</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .log {
      margin-top: 20px;
      background: #f5f5f5;
      padding: 10px;
      min-height: 60px;
    }
  </style>
</head>
<body>

  <h2>📦 出库指令</h2>

  <input id="product" placeholder="产品名称">
  <input id="quantity" type="number" placeholder="数量">

  <button onclick="submitData()">提交</button>
  <button onclick="clearLogs()">清空记录</button>

  <div class="log" id="log"></div>

  <script>
    let logs = JSON.parse(localStorage.getItem('logs') || '[]');

    function renderLogs() {
      document.getElementById('log').innerHTML = logs.length
        ? logs.join('')
        : '暂无记录';
    }

    function submitData() {
      const product = document.getElementById('product').value.trim();
      const quantity = document.getElementById('quantity').value.trim();

      if (!product || !quantity) {
        alert("请填写完整信息");
        return;
      }

      const time = new Date().toLocaleString();
      const record = `时间：${time}<br>产品：${product}<br>数量：${quantity}<hr>`;

      logs.push(record);
      localStorage.setItem('logs', JSON.stringify(logs));
      renderLogs();

      document.getElementById('product').value = '';
      document.getElementById('quantity').value = '';
    }

    function clearLogs() {
      if (!confirm("确定要清空全部记录吗？")) {
        return;
      }

      logs = [];
      localStorage.removeItem('logs');
      renderLogs();
    }

    renderLogs();
  </script>

</body>
</html>
