<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>出库指令</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
    }
    .log {
      margin-top: 20px;
      background: #f5f5f5;
      padding: 10px;
    }
  </style>
</head>
<body>

  <h2>📦 出库指令</h2>

  <input id="product" placeholder="产品名称">
  <input id="quantity" type="number" placeholder="数量">

  <button onclick="submitData()">提交</button>

  <div class="log" id="log"></div>

  <script>
    let logs = JSON.parse(localStorage.getItem('logs') || '[]');

    function renderLogs() {
      document.getElementById('log').innerHTML = logs.join('');
    }

    function submitData() {
      const product = document.getElementById('product').value;
      const quantity = document.getElementById('quantity').value;

      if (!product || !quantity) {
        alert("请填写完整信息");
        return;
      }

      const time = new Date().toLocaleString();

      const record = `时间：${time}<br>产品：${product}<br>数量：${quantity}<hr>`;

      logs.push(record);

      localStorage.setItem('logs', JSON.stringify(logs));

      renderLogs();

      // 清空输入框
      document.getElementById('product').value = '';
      document.getElementById('quantity').value = '';
    }

    // 页面加载时渲染
    renderLogs();
  </script>

</body>
</html>
